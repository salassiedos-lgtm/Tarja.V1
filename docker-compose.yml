# Stack de producción TARJA V.1 — pensado para Coolify (Docker Compose resource)
#
# Coolify inyecta las variables desde su UI (pestaña Environment Variables).
# Los dominios/HTTPS los gestiona el proxy de Coolify (Traefik): en la UI
# asignas un dominio a `frontend` (puerto 3000) y otro a `backend` (puerto 3000).
#
# Para probar en local: docker compose up --build   (usa docker-compose.override.yml)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      # Origen permitido por CORS = URL pública del frontend
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      PORT: 3000
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('net').connect(3000,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      args:
        # URL pública de la API (se inlinea en el bundle en build-time)
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      # Con NEXT_PUBLIC_API_URL=/api (mismo origen), el server de Next reescribe
      # /api/* a este destino. Debe ser el nombre de servicio interno del backend,
      # NO localhost. Sin esto, el login da 500 en producción.
      BACKEND_URL: ${BACKEND_URL:-http://backend:3000}
    expose:
      - "3000"

volumes:
  pgdata:
